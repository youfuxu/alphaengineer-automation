name: Upload Reel to Instagram

on:
  workflow_dispatch:
    inputs:
      reel_number:
        description: 'Reel number to upload (e.g. 01)'
        required: true
        default: '01'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Upload Reel ${{ github.event.inputs.reel_number }}
        run: node scripts/upload-reel.mjs
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          REEL_NUMBER: ${{ github.event.inputs.reel_number }}
